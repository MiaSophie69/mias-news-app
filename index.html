<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mias News</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mias News">
    
    <link rel="apple-touch-icon" href="logo.png?v=2">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f7f7f8; color: #1a1a1a; padding: 20px; padding-bottom: 40px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; margin-bottom: 15px; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
        
        .heart-btn { background: white; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #8e8e93; transition: all 0.2s; }
        .heart-btn.active { color: #ff2d55; }
        
        .back-btn { width: 100%; background: rgba(0,0,0,0.05); border: none; padding: 14px; border-radius: 15px; font-weight: 600; font-size: 15px; margin-top: 15px; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        .search-container { background: white; border: 1px solid rgba(0,0,0,0.1); padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .search-container input { border: none; width: 100%; font-size: 15px; outline: none; background: transparent; color: black; }
        
        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 12px 0; margin-bottom: 5px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: rgba(0,0,0,0.03); border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; color: #8e8e93; cursor: pointer; }
        .cat-btn.active { background: white; color: black; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        
        .sub-categories { display: none; gap: 8px; padding: 5px 0 12px 0; overflow-x: auto; }
        .sub-cat-btn { background: transparent; border: 1px solid rgba(0,0,0,0.1); padding: 6px 14px; border-radius: 15px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; }
        .sub-cat-btn.active { background: #ff2d55; color: white; border-color: #ff2d55; }

        .news-list { display: flex; flex-direction: column; gap: 16px; margin-top: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 12px; position: relative; }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 8px; text-transform: uppercase; }
        
        .popkultur { background-color: #fbdce3; color: #3a3a3a; }
        .weltgeschehen { background-color: #d1e2ef; color: #3a3a3a; }
        .technologie { background-color: #d6ede0; color: #3a3a3a; }
        .regionales { background-color: #ffeaa7; color: #3a3a3a; }
        
        .card h2 { font-size: 17px; font-weight: 600; line-height: 1.4; color: #1a1a1a; padding-right: 25px; cursor: pointer; }
        .card p { font-size: 14px; color: #666; line-height: 1.5; display: none; } 
        .card.open p { display: block; margin-top: 5px; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #8e8e93; margin-top: 4px; font-weight: 500; }
        .card-heart { background: transparent; border: none; font-size: 16px; color: #cbd5e1; outline: none; }
        .card-heart.active { color: #ff2d55; }
        
        .empty-state { text-align: center; margin-top: 40px; color: #8e8e93; font-size: 14px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Mias News</h1>
        <button class="heart-btn" id="main-heart-btn" onclick="toggleFavoritenModus()">❤️</button>
    </header>

    <div id="controls-area">
        <div class="search-container">
            <span style="font-style: normal;">🔍</span>
            <input type="text" id="search-input" placeholder="Nachrichten durchsuchen..." oninput="renderNews()">
        </div>

        <div class="categories">
            <button class="cat-btn active" onclick="filterKategorie('Alle', this)">Alle</button>
            <button class="cat-btn" onclick="filterKategorie('Weltgeschehen', this)">Weltgeschehen</button>
            <button class="cat-btn" onclick="filterKategorie('Regionales', this)">Regionales</button>
            <button class="cat-btn" onclick="filterKategorie('Popkultur', this)">Popkultur</button>
            <button class="cat-btn" onclick="filterKategorie('Technologie', this)">Technologie</button>
        </div>
        
        <div class="sub-categories" id="stadt-filter-bereich">
            <button class="sub-cat-btn active" onclick="filterStadt('beides', this)">Beides</button>
            <button class="sub-cat-btn" onclick="filterStadt('luebeck', this)">Lübeck</button>
            <button class="sub-cat-btn" onclick="filterStadt('hamburg', this)">Hamburg</button>
        </div>
    </div>
    
    <button class="back-btn" id="back-btn" style="display: none;" onclick="toggleFavoritenModus()">
        &larr; Zurück zu allen News
    </button>

    <div class="news-list" id="news-container"></div>

    <script>
        let allNews = [];
        let favoritenSet = new Set(JSON.parse(localStorage.getItem('mias_favoriten') || '[]'));
        let aktuelleKategorie = 'Alle';
        let aktuelleStadt = 'beides';
        let nurFavoritenModus = false;

        function bereinigeText(text) {
            if (!text) return "";
            return text.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
        }

        async function ladeEchteNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "<div class='empty-state'>Lade gefilterte Premium-News...</div>";
            
            try {
                const response = await fetch(`https://mias-news-backend.onrender.com/api/live-news`);
                const data = await response.json();
                
                if (data.articles) {
                    const geseheneTitel = new Set();
                    allNews = data.articles
                        .filter(a => a.title && a.description)
                        .filter(a => {
                            if (geseheneTitel.has(a.title)) return false;
                            geseheneTitel.add(a.title);
                            return true;
                        })
                        .map((artikel, index) => {
                            let kat = "Weltgeschehen";
                            let t = artikel.title.toLowerCase();
                            let d = artikel.description.toLowerCase();
                            
                            // Tolerante Einsortierung
                            if (t.includes("hamburg") || d.includes("hamburg") || t.includes("lübeck") || d.includes("lübeck") || t.includes("luebeck") || d.includes("luebeck") || t.includes("beck")) {
                                kat = "Regionales";
                            } else if (t.includes("musik") || t.includes("film") || t.includes("kino") || t.includes("star") || t.includes("album") || t.includes("konzert") || t.includes("promi")) {
                                kat = "Popkultur";
                            } else if (t.includes("ki") || t.includes("apple") || t.includes("google") || t.includes("tech") || t.includes("smartphone") || t.includes("chatgpt")) {
                                kat = "Technologie";
                            }
                            
                            return {
                                id: 'news_' + index,
                                titel: bereinigeText(artikel.title),
                                beschreibung: bereinigeText(artikel.description),
                                kategorie: kat,
                                quelle: bereinigeText(artikel.source.name),
                                url: artikel.url
                            };
                        });
                }
                if(allNews.length === 0) container.innerHTML = "<div class='empty-state'>Keine Artikel gefunden.</div>";
            } catch (e) {
                console.error("Fehler beim Laden:", e);
            }
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            const searchWord = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';
            
            let gefiltert = allNews;
            
            if (nurFavoritenModus) {
                gefiltert = gefiltert.filter(n => favoritenSet.has(n.id));
            } else {
                if (aktuelleKategorie !== 'Alle') {
                    gefiltert = gefiltert.filter(n => n.kategorie === aktuelleKategorie);
                }
                
                if (aktuelleKategorie === 'Regionales' && aktuelleStadt !== 'beides') {
                    gefiltert = gefiltert.filter(n => {
                        let text = (n.titel + " " + n.beschreibung).toLowerCase();
                        if (aktuelleStadt === 'luebeck') return text.includes('lübeck') || text.includes('luebeck') || text.includes('beck');
                        if (aktuelleStadt === 'hamburg') return text.includes('hamburg');
                        return true;
                    });
                }
            }
            
            if (searchWord && !nurFavoritenModus) {
                gefiltert = gefiltert.filter(n => n.titel.toLowerCase().includes(searchWord) || n.beschreibung.toLowerCase().includes(searchWord));
            }
            
            if (gefiltert.length === 0) {
                container.innerHTML = `<div class='empty-state'>Keine Artikel gefunden.</div>`;
                return;
            }
            
            gefiltert.forEach(news => {
                const istFav = favoritenSet.has(news.id);
                const classKat = news.kategorie.toLowerCase();
                const card = document.createElement('div');
                card.className = 'card';
                
                // HIER IST DER FIX: Die Publikationen sind weg, der Link ist sauber rechtsbündig!
                card.innerHTML = `
                    <div class="card-top">
                        <span class="badge ${classKat}">${news.kategorie}</span>
                        <button class="card-heart ${istFav ? 'active' : ''}" onclick="toggleFavorit('${news.id}', event)">${istFav ? '❤️' : '🤍'}</button>
                    </div>
                    <h2 onclick="this.parentElement.classList.toggle('open')">${news.titel}</h2>
                    <p><strong>Zusammenfassung:</strong> ${news.beschreibung}<br><br><strong>Hauptquelle:</strong> ${news.quelle}</p>
                    <div class="card-footer" style="justify-content: flex-end;">
                        <a href="${news.url}" target="_blank" style="color: #ff2d55; text-decoration: none; font-weight: 600;">Original lesen &rarr;</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterKategorie(kat, btn) {
            aktuelleKategorie = kat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const stadtBereich = document.getElementById('stadt-filter-bereich');
            if (kat === 'Regionales') stadtBereich.style.display = 'flex';
            else stadtBereich.style.display = 'none';
            
            renderNews();
        }

        function filterStadt(stadt, btn) {
            aktuelleStadt = stadt;
            document.querySelectorAll('.sub-cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNews();
        }

        function toggleFavorit(id, event) {
            event.stopPropagation();
            if (favoritenSet.has(id)) favoritenSet.delete(id);
            else favoritenSet.add(id);
            localStorage.setItem('mias_favoriten', JSON.stringify([...favoritenSet]));
            renderNews();
        }

        function toggleFavoritenModus() {
            nurFavoritenModus = !nurFavoritenModus;
            document.getElementById('app-title').innerText = nurFavoritenModus ? "Deine Favoriten" : "Mias News";
            document.getElementById('controls-area').style.display = nurFavoritenModus ? 'none' : 'block';
            document.getElementById('back-btn').style.display = nurFavoritenModus ? 'flex' : 'none';
            document.getElementById('main-heart-btn').style.display = nurFavoritenModus ? 'none' : 'block';
            renderNews();
        }

        ladeEchteNews();
    </script>
</body>
</html>
